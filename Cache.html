<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LRU Cache Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-6 rounded-2xl shadow-xl w-[500px]">
      <h1 class="text-2xl font-bold mb-4 text-center">LRU Cache Visualizer</h1>

      <div class="flex gap-2 mb-4">
        <input
          id="capacity"
          type="number"
          placeholder="Capacity"
          class="border p-2 rounded w-full"
        />
        <button
          onclick="initCache()"
          class="bg-blue-500 text-white px-4 rounded"
        >
          Init
        </button>
      </div>

      <div class="flex gap-2 mb-4">
        <input
          id="key"
          type="number"
          placeholder="Key"
          class="border p-2 rounded w-1/2"
        />
        <input
          id="value"
          type="number"
          placeholder="Value"
          class="border p-2 rounded w-1/2"
        />
      </div>

      <div class="flex gap-2 mb-4">
        <button
          onclick="put()"
          class="bg-green-500 text-white px-4 py-2 rounded w-full"
        >
          Put
        </button>
        <button
          onclick="get()"
          class="bg-purple-500 text-white px-4 py-2 rounded w-full"
        >
          Get
        </button>
      </div>

      <div id="output" class="mb-4 text-center font-semibold"></div>

      <div>
        <h2 class="font-semibold mb-2">Cache State (Most → Least Recent)</h2>
        <div id="cache" class="flex gap-2 flex-wrap"></div>
      </div>
    </div>

    <script>
      let capacity = 0;
      let cache = new Map();

      function initCache() {
        capacity = parseInt(document.getElementById("capacity").value);
        cache.clear();
        render();
      }

      function get() {
        const key = document.getElementById("key").value;
        if (!cache.has(key)) {
          document.getElementById("output").innerText = "Output: -1";
          return;
        }

        const val = cache.get(key);
        cache.delete(key);
        cache.set(key, val);

        document.getElementById("output").innerText = "Output: " + val;
        render();
      }

      function put() {
        const key = document.getElementById("key").value;
        const value = document.getElementById("value").value;

        if (cache.has(key)) {
          cache.delete(key);
        }

        cache.set(key, value);

        if (cache.size > capacity) {
          const firstKey = cache.keys().next().value;
          cache.delete(firstKey);
        }

        render();
      }

      function render() {
        const container = document.getElementById("cache");
        container.innerHTML = "";

        const entries = Array.from(cache.entries()).reverse();

        entries.forEach(([k, v]) => {
          const div = document.createElement("div");
          div.className = "bg-gray-200 px-3 py-2 rounded shadow";
          div.innerText = k + ":" + v;
          container.appendChild(div);
        });
      }
    </script>
  </body>
</html>
